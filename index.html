<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>izm | SYSTEM ERROR</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Orbitron', sans-serif;
}

body{
    height:100vh;
    background:#050510;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    color:white;
}

/* 背景グリッド */
body::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background-image:
        linear-gradient(rgba(0,255,255,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,255,0.07) 1px, transparent 1px);
    background-size:40px 40px;
    animation:moveGrid 20s linear infinite;
}

@keyframes moveGrid{
    from{transform:translate(0,0);}
    to{transform:translate(-40px,-40px);}
}

/* メインカード */
.container{
    position:relative;
    padding:70px 100px;
    border-radius:20px;
    background:rgba(0,0,30,0.6);
    backdrop-filter:blur(15px);
    border:1px solid rgba(0,255,255,0.4);
    box-shadow:0 0 50px rgba(0,255,255,0.4);
    text-align:center;
    z-index:1;
}

/* グリッチ文字 */
.glitch{
    font-size:4rem;
    letter-spacing:10px;
    position:relative;
    color:#00ffff;
    text-shadow:
        0 0 5px #00ffff,
        0 0 20px #00ffff,
        0 0 40px #00ffff;
}

/* ノイズオーバーレイ */
.noise{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
    opacity:0;
    background-image:url("https://grainy-gradients.vercel.app/noise.svg");
    mix-blend-mode:screen;
    z-index:999;
}

.flash{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:white;
    opacity:0;
    pointer-events:none;
    z-index:998;
}

.subtitle{
    margin-top:25px;
    font-size:1.2rem;
    opacity:0.7;
    letter-spacing:3px;
}

button{
    margin-top:40px;
    padding:12px 35px;
    border:none;
    border-radius:30px;
    background:transparent;
    border:1px solid cyan;
    color:cyan;
    font-size:1rem;
    letter-spacing:2px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:cyan;
    color:#050510;
    box-shadow:0 0 20px cyan;
    transform:scale(1.1);
}
</style>
</head>

<body>

<div class="noise" id="noise"></div>
<div class="flash" id="flash"></div>

<div class="container">
    <h1 class="glitch">IZM</h1>
    <div class="subtitle">SIGNAL DISTORTION</div>
    <button onclick="alert('REALITY FRAGMENTED')">ACCESS</button>
</div>

<script>
const noise = document.getElementById("noise");
const flash = document.getElementById("flash");

function glitchBurst(){
    noise.style.opacity = "0.6";
    flash.style.opacity = "0.4";
    document.body.style.transform = "translateX(5px)";

    setTimeout(()=>{
        noise.style.opacity = "0";
        flash.style.opacity = "0";
        document.body.style.transform = "translateX(0)";
    },120);
}

function randomGlitch(){
    glitchBurst();
    const next = Math.random()*4000 + 2000;
    setTimeout(randomGlitch, next);
}

setTimeout(randomGlitch, 3000);
</script>

</body>
</html>
