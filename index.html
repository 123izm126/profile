<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Izumi</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #ffffff;
  color: #222;
  transition: all 0.5s ease;
  overflow-x: hidden;
}

/* 通常ページ */
.container {
  padding: 100px;
  text-align: center;
}

/* 起動画面 */
.boot-screen {
  position: fixed;
  inset: 0;
  background: black;
  color: #ff2222;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-family: monospace;
  letter-spacing: 3px;
  font-size: 1.2rem;
  z-index: 20;
}

/* 警告画面 */
.warning-screen {
  position: fixed;
  inset: 0;
  background: black;
  color: #ff0000;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: monospace;
  font-size: 1.4rem;
  letter-spacing: 4px;
  z-index: 25;
  display: none;
}

/* ノイズ */
.noise {
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    rgba(255,255,255,0.15) 0px,
    rgba(0,0,0,0.15) 2px,
    rgba(255,255,255,0.15) 4px
  );
  animation: noiseMove 0.15s infinite;
  opacity: 0;
  z-index: 24;
}

@keyframes noiseMove {
  0% { transform: translate(0,0); }
  50% { transform: translate(-3px,3px); }
  100% { transform: translate(3px,-3px); }
}

.noise.active {
  opacity: 1;
}

/* グリッチモード */
.glitch-mode {
  filter: invert(1);
}

/* 文字ブレ */
.glitch-mode h1,
.glitch-mode p {
  animation: textGlitch 0.15s infinite;
}

@keyframes textGlitch {
  0% { transform: translate(2px, -2px); }
  50% { transform: translate(-2px, 2px); }
  100% { transform: translate(1px, 1px); }
}

/* 隠しボタン */
#hiddenBtn {
  position: fixed;
  bottom: 10px;
  right: 10px;
  width: 40px;
  height: 40px;
  opacity: 0;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="boot-screen" id="boot">
  <div>Do not close this window.</div>
  <div>Reality is temporarily unavailable.</div>
</div>

<div class="warning-screen" id="warning">
  Do not look it up.
</div>

<div class="noise" id="noiseLayer"></div>

<div class="container">
  <h1 id="name">イズミ</h1>
  <p id="desc">喋るのがすきです</p>
</div>

<div id="hiddenBtn"></div>

<script>
const noise = document.getElementById("noiseLayer");
const boot = document.getElementById("boot");
const warning = document.getElementById("warning");
const name = document.getElementById("name");
const desc = document.getElementById("desc");

/* 起動演出 */
window.addEventListener("load", () => {
  setTimeout(() => {
    noise.classList.add("active");
  }, 1000);

  setTimeout(() => {
    boot.style.display = "none";
    noise.classList.remove("active");
  }, 1600);
});

/* 文字化け関数 */
function corruptText(text) {
  const chars = "█▓▒░@#$%&*?";
  return text.split("").map(c => {
    if (Math.random() > 0.5) {
      return chars[Math.floor(Math.random() * chars.length)];
    }
    return c;
  }).join("");
}

/* 隠しボタン */
const hiddenBtn = document.getElementById("hiddenBtn");

hiddenBtn.addEventListener("click", () => {

  // グリッチ開始
  document.body.classList.add("glitch-mode");

  // 文字化け
  name.innerText = corruptText("イズミ");
  desc.innerText = corruptText("喋るのがすきです");

  noise.classList.add("active");

  setTimeout(() => {

    // 警告表示
    warning.style.display = "flex";
    noise.classList.remove("active");

  }, 600);

  setTimeout(() => {

    // 再ノイズ
    noise.classList.add("active");
    warning.style.display = "none";

  }, 1100);

  setTimeout(() => {

    // 完全復帰
    document.body.classList.remove("glitch-mode");
    noise.classList.remove("active");
    name.innerText = "イズミ";
    desc.innerText = "喋るのがすきです";

  }, 1600);

});
</script>

</body>
</html>
