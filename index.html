<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>izm | BEAUTIFUL SHIFT</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Orbitron',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#050510;
    color:white;
    overflow:hidden;
    transition:1s ease;
}

.container{
    text-align:center;
    padding:70px 100px;
    border-radius:20px;
    background:rgba(0,0,30,0.5);
    backdrop-filter:blur(15px);
    border:1px solid rgba(0,255,255,0.4);
    box-shadow:0 0 50px rgba(0,255,255,0.4);
    transition:1s ease;
}

h1{
    font-size:4rem;
    letter-spacing:12px;
    color:#00ffff;
    text-shadow:0 0 20px cyan,0 0 40px cyan;
    transition:1s ease;
}

.subtitle{
    margin-top:25px;
    opacity:0.7;
    letter-spacing:3px;
    transition:1s ease;
}

button{
    margin-top:40px;
    padding:12px 35px;
    border-radius:30px;
    border:1px solid cyan;
    background:transparent;
    color:cyan;
    cursor:pointer;
    transition:0.4s;
}

button:hover{
    background:cyan;
    color:black;
    transform:scale(1.08);
}

/* --- モード1（反転） --- */
.mode1{
    background:#ffffff;
    color:#000;
}
.mode1 .container{
    background:rgba(255,255,255,0.85);
    border:1px solid #000;
    box-shadow:0 0 40px rgba(0,0,0,0.3);
}
.mode1 h1{
    color:#000;
    text-shadow:none;
}
.mode1 button{
    border:1px solid #000;
    color:#000;
}
.mode1 button:hover{
    background:#000;
    color:#fff;
}

/* --- モード2（ネオン覚醒） --- */
.mode2{
    background:#0a0015;
    color:#ff00c8;
}
.mode2 h1{
    color:#ff00c8;
    text-shadow:0 0 20px #ff00c8,0 0 60px #ff00c8;
}
.mode2 .container{
    border:1px solid #ff00c8;
    box-shadow:0 0 60px #ff00c8;
}
.mode2 button{
    border:1px solid #ff00c8;
    color:#ff00c8;
}
.mode2 button:hover{
    background:#ff00c8;
    color:black;
}

/* --- モード3（宇宙） --- */
.space{
    background:radial-gradient(circle at center,#000010,#000000 70%);
}
.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    animation:twinkle 3s infinite alternate;
}
@keyframes twinkle{
    from{opacity:0.2;}
    to{opacity:1;}
}

/* フェードアウト */
.fadeout{
    opacity:0;
}
</style>
</head>

<body>

<div class="container">
    <h1 id="title">IZM</h1>
    <div class="subtitle" id="subtitle">CLICK TO SHIFT</div>
    <button onclick="shiftReality()">SHIFT</button>
</div>

<script>
let stage = 0;

function shiftReality(){
    const body = document.body;
    const subtitle = document.getElementById("subtitle");

    stage++;
    body.className = "";

    if(stage === 1){
        body.classList.add("mode1");
        subtitle.textContent = "INVERTED WORLD";
    }
    else if(stage === 2){
        body.classList.add("mode2");
        subtitle.textContent = "NEON AWAKENING";
    }
    else if(stage === 3){
        body.classList.add("space");
        subtitle.textContent = "COSMIC STATE";
        createStars();
    }
    else{
        // 美しく戻る
        body.classList.add("fadeout");
        setTimeout(()=>{
            body.className="";
            subtitle.textContent="CLICK TO SHIFT";
            removeStars();
            stage = 0;
            body.classList.remove("fadeout");
        },1000);
    }
}

function createStars(){
    for(let i=0;i<80;i++){
        const star=document.createElement("div");
        star.className="star";
        star.style.top=Math.random()*100+"%";
        star.style.left=Math.random()*100+"%";
        star.style.animationDuration=(Math.random()*3+2)+"s";
        document.body.appendChild(star);
    }
}

function removeStars(){
    document.querySelectorAll(".star").forEach(s=>s.remove());
}
</script>

</body>
</html>
