<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Izumi</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #ffffff;
  color: #222;
  transition: filter 0.8s ease;
}

/* 色調反転 */
.invert {
  filter: invert(1) hue-rotate(180deg);
}

/* ノイズ用レイヤー */
.noise {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  background-image: repeating-linear-gradient(
    0deg,
    rgba(0,0,0,0.2) 0px,
    rgba(255,255,255,0.2) 2px,
    rgba(0,0,0,0.2) 4px
  );
  mix-blend-mode: overlay;
  animation: noiseMove 0.2s infinite;
  opacity: 0;
}

@keyframes noiseMove {
  0% { transform: translate(0,0); }
  50% { transform: translate(-2px,2px); }
  100% { transform: translate(2px,-2px); }
}

.noise.active {
  opacity: 1;
}

/* 普通の自己紹介 */
.container {
  padding: 100px;
  text-align: center;
}

h1 {
  font-size: 3rem;
}

p {
  font-size: 1.2rem;
}
</style>
</head>

<body>

<div class="noise" id="noiseLayer"></div>

<div class="container">
  <h1>イズミ</h1>
  <p>喋るのがすきです</p>
</div>

<script>
window.addEventListener("load", () => {
  const body = document.body;
  const noise = document.getElementById("noiseLayer");

  // ① 色調反転（1.2秒）
  body.classList.add("invert");

  setTimeout(() => {
    // ② ノイズ発生（1.5秒）
    noise.classList.add("active");
  }, 1200);

  setTimeout(() => {
    // ③ すべて解除 → 通常へ
    body.classList.remove("invert");
    noise.classList.remove("active");
  }, 2700);
});
</script>

</body>
</html>
