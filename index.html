<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Izumi</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #ffffff;
  color: #222;
  transition: 0.4s;
  overflow-x: hidden;
}

/* 中央コンテナ */
.center-box {
  position: relative;
  width: 500px;
  max-width: 90%;
  margin: 100px auto;
  text-align: center;
  padding: 40px;
}

/* 起動画面 */
.boot-screen,
.warning-screen {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 50;
  font-family: monospace;
  letter-spacing: 3px;
}

.boot-content,
.warning-content {
  position: relative;
  padding: 40px;
  background: black;
  color: #ff2222;
  text-align: center;
  overflow: hidden;
}

.warning-content {
  color: red;
}

/* 中央ノイズ */
.center-noise {
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    rgba(255,255,255,0.2) 0px,
    rgba(0,0,0,0.2) 2px,
    rgba(255,255,255,0.2) 4px
  );
  animation: noiseMove 0.1s infinite;
  opacity: 0;
}

@keyframes noiseMove {
  0% { transform: translate(0,0); }
  50% { transform: translate(-4px,4px); }
  100% { transform: translate(4px,-4px); }
}

.center-noise.active {
  opacity: 1;
}

/* グリッチ文字 */
.glitch-mode h1,
.glitch-mode p {
  animation: textGlitch 0.15s infinite;
}

@keyframes textGlitch {
  0% { transform: translate(2px, -2px); }
  50% { transform: translate(-2px, 2px); }
  100% { transform: translate(1px, 1px); }
}

/* 隠しボタン */
#hiddenBtn {
  position: fixed;
  bottom: 15px;
  right: 15px;
  width: 40px;
  height: 40px;
  z-index: 100;
  cursor: pointer;
}

#hiddenBtn:hover {
  box-shadow: 0 0 10px rgba(255,0,0,0.4);
}
</style>
</head>

<body>

<!-- 起動 -->
<div class="boot-screen" id="boot">
  <div class="boot-content">
    <div>Do not close this window.</div>
    <div>Reality is temporarily unavailable.</div>
    <div class="center-noise" id="bootNoise"></div>
  </div>
</div>

<!-- 警告 -->
<div class="warning-screen" id="warning" style="display:none;">
  <div class="warning-content">
    Do not look it up.
    <div class="center-noise" id="warnNoise"></div>
  </div>
</div>

<!-- 通常 -->
<div class="center-box">
  <h1 id="name">イズミ</h1>
  <p id="desc">喋るのがすきです</p>
  <div class="center-noise" id="mainNoise"></div>
</div>

<div id="hiddenBtn"></div>

<script>
const boot = document.getElementById("boot");
const warning = document.getElementById("warning");
const nameEl = document.getElementById("name");
const descEl = document.getElementById("desc");

const bootNoise = document.getElementById("bootNoise");
const warnNoise = document.getElementById("warnNoise");
const mainNoise = document.getElementById("mainNoise");

let glitchActive = false;

/* 起動演出 */
window.addEventListener("load", () => {
  setTimeout(() => bootNoise.classList.add("active"), 800);
  setTimeout(() => boot.style.display = "none", 1500);
});

/* 文字化け */
function corrupt(text) {
  const chars = "█▓▒░@#$%&*?";
  return text.split("").map(c =>
    Math.random() > 0.5
      ? chars[Math.floor(Math.random()*chars.length)]
      : c
  ).join("");
}

/* 隠しボタン */
document.getElementById("hiddenBtn").addEventListener("click", () => {

  if (glitchActive) return;
  glitchActive = true;

  document.body.classList.add("glitch-mode");
  nameEl.innerText = corrupt("イズミ");
  descEl.innerText = corrupt("喋るのがすきです");

  mainNoise.classList.add("active");

  setTimeout(() => {
    warning.style.display = "flex";
    warnNoise.classList.add("active");
    mainNoise.classList.remove("active");
  }, 600);

  setTimeout(() => {
    warning.style.display = "none";
    mainNoise.classList.remove("active");
    document.body.classList.remove("glitch-mode");
    nameEl.innerText = "イズミ";
    descEl.innerText = "喋るのがすきです";
    glitchActive = false;
  }, 1200);

});

/* Shiftギミック */
document.addEventListener("keydown", e => {
  if (e.key === "Shift") nameEl.innerText = "IZUMI";
});
document.addEventListener("keyup", e => {
  if (e.key === "Shift") nameEl.innerText = "イズミ";
});
</script>

</body>
</html>
