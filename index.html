<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>izm | RECREATION</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Orbitron',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#050510;
    color:white;
    overflow:hidden;
    transition:1.5s ease;
}

/* メインカード */
.container{
    text-align:center;
    padding:70px 100px;
    border-radius:20px;
    background:rgba(0,0,30,0.5);
    backdrop-filter:blur(15px);
    border:1px solid rgba(0,255,255,0.4);
    box-shadow:0 0 50px rgba(0,255,255,0.4);
    transition:1.5s ease;
}

h1{
    font-size:4rem;
    letter-spacing:12px;
    color:#00ffff;
    text-shadow:0 0 20px cyan,0 0 50px cyan;
    transition:1.5s ease;
}

.subtitle{
    margin-top:25px;
    opacity:0.7;
    letter-spacing:3px;
    transition:1.5s ease;
}

button{
    margin-top:40px;
    padding:12px 35px;
    border-radius:30px;
    border:1px solid cyan;
    background:transparent;
    color:cyan;
    cursor:pointer;
    transition:0.4s;
}

button:hover{
    background:cyan;
    color:black;
}

/* 崩壊エフェクト */
.collapse .container{
    transform:scale(1.2) rotate(5deg);
    opacity:0;
    filter:blur(10px);
}

.collapse{
    background:black;
}

/* 無の状態 */
.void{
    background:black;
    color:black;
}

/* 再構築光 */
.light{
    position:absolute;
    width:6px;
    height:6px;
    background:white;
    border-radius:50%;
    animation:rise 3s ease forwards;
}

@keyframes rise{
    0%{transform:translateY(50vh);opacity:0;}
    30%{opacity:1;}
    100%{transform:translateY(-50vh);opacity:0;}
}

/* 新世界 */
.reborn{
    background:radial-gradient(circle at center,#001a1a,#000000 70%);
}

.reborn .container{
    background:rgba(0,255,200,0.1);
    border:1px solid #00ffc8;
    box-shadow:0 0 60px #00ffc8;
}

.reborn h1{
    color:#00ffc8;
    text-shadow:0 0 20px #00ffc8,0 0 60px #00ffc8;
}

.reborn button{
    border:1px solid #00ffc8;
    color:#00ffc8;
}

.reborn button:hover{
    background:#00ffc8;
    color:black;
}
</style>
</head>
<body>

<div class="container">
    <h1 id="title">IZM</h1>
    <div class="subtitle" id="subtitle">CREATE. DESTROY. RECREATE.</div>
    <button onclick="beginRecreation()">SHIFT</button>
</div>

<script>
function beginRecreation(){
    const body = document.body;
    const subtitle = document.getElementById("subtitle");

    // 崩壊
    body.className = "collapse";
    subtitle.textContent = "WORLD COLLAPSING";

    setTimeout(()=>{
        // 無
        body.className = "void";
        subtitle.textContent = "";
        createLight();

        setTimeout(()=>{
            // 再誕
            body.className = "reborn";
            subtitle.textContent = "A NEW REALITY";
        },3000);

    },1500);
}

function createLight(){
    for(let i=0;i<60;i++){
        const light=document.createElement("div");
        light.className="light";
        light.style.left=Math.random()*100+"%";
        light.style.animationDuration=(Math.random()*2+2)+"s";
        document.body.appendChild(light);
    }
}
</script>

</body>
</html>
