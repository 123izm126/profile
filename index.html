<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>izm | REALITY SHIFT</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Orbitron', sans-serif;
}

body{
    height:100vh;
    background:#050510;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    color:white;
    transition:0.6s ease;
}

/* 背景グリッド */
body::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background-image:
        linear-gradient(rgba(0,255,255,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,255,0.07) 1px, transparent 1px);
    background-size:40px 40px;
    animation:moveGrid 20s linear infinite;
}

@keyframes moveGrid{
    from{transform:translate(0,0);}
    to{transform:translate(-40px,-40px);}
}

.container{
    position:relative;
    padding:70px 100px;
    border-radius:20px;
    background:rgba(0,0,30,0.6);
    backdrop-filter:blur(15px);
    border:1px solid rgba(0,255,255,0.4);
    box-shadow:0 0 50px rgba(0,255,255,0.4);
    text-align:center;
    z-index:1;
    transition:0.6s ease;
}

h1{
    font-size:4rem;
    letter-spacing:10px;
    color:#00ffff;
    text-shadow:
        0 0 5px #00ffff,
        0 0 20px #00ffff,
        0 0 40px #00ffff;
    transition:0.6s ease;
}

.subtitle{
    margin-top:25px;
    font-size:1.2rem;
    opacity:0.7;
    letter-spacing:3px;
    transition:0.6s ease;
}

button{
    margin-top:40px;
    padding:12px 35px;
    border:none;
    border-radius:30px;
    background:transparent;
    border:1px solid cyan;
    color:cyan;
    font-size:1rem;
    letter-spacing:2px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:cyan;
    color:#050510;
    box-shadow:0 0 20px cyan;
    transform:scale(1.1);
}

/* 崩壊エフェクト */
.glitch{
    animation:shake 0.15s infinite;
}

@keyframes shake{
    0%{transform:translate(3px,-3px);}
    25%{transform:translate(-3px,3px);}
    50%{transform:translate(3px,3px);}
    75%{transform:translate(-3px,-3px);}
    100%{transform:translate(0,0);}
}

/* 変化後モード */
.shifted{
    background:#ffffff;
    color:#000000;
}

.shifted .container{
    background:rgba(255,255,255,0.8);
    border:1px solid black;
    box-shadow:0 0 40px rgba(0,0,0,0.3);
}

.shifted h1{
    color:#000000;
    text-shadow:none;
}

.shifted button{
    border:1px solid black;
    color:black;
}

.shifted button:hover{
    background:black;
    color:white;
}

</style>
</head>

<body>

<div class="container">
    <h1 id="title">IZM</h1>
    <div class="subtitle" id="subtitle">CLICK TO DISTORT REALITY</div>
    <button onclick="shiftReality()">SHIFT</button>
</div>

<script>
let shifted = false;

function shiftReality(){
    const body = document.body;
    const title = document.getElementById("title");
    const subtitle = document.getElementById("subtitle");

    // 一瞬崩壊
    body.classList.add("glitch");

    setTimeout(()=>{
        body.classList.remove("glitch");

        shifted = !shifted;

        if(shifted){
            body.classList.add("shifted");
            subtitle.textContent = "REALITY HAS CHANGED";
        }else{
            body.classList.remove("shifted");
            subtitle.textContent = "CLICK TO DISTORT REALITY";
        }

    },200);
}
</script>

</body>
</html>
