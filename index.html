<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Izumi</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #ffffff;
  color: #222;
  transition: 0.4s;
  overflow-x: hidden;
}

/* 通常 */
.container {
  padding: 100px;
  text-align: center;
}

/* 起動画面 */
.boot-screen {
  position: fixed;
  inset: 0;
  background: black;
  color: #ff2222;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-family: monospace;
  letter-spacing: 3px;
  font-size: 1.2rem;
  z-index: 50;
}

/* 警告画面 */
.warning-screen {
  position: fixed;
  inset: 0;
  background: black;
  color: #ff0000;
  display: none;
  justify-content: center;
  align-items: center;
  font-family: monospace;
  font-size: 1.4rem;
  letter-spacing: 4px;
  z-index: 60;
}

/* ノイズ */
.noise {
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    rgba(255,255,255,0.2) 0px,
    rgba(0,0,0,0.2) 2px,
    rgba(255,255,255,0.2) 4px
  );
  animation: noiseMove 0.1s infinite;
  opacity: 0;
  z-index: 55;
}

@keyframes noiseMove {
  0% { transform: translate(0,0); }
  50% { transform: translate(-4px,4px); }
  100% { transform: translate(4px,-4px); }
}

.noise.active {
  opacity: 1;
}

/* グリッチ */
.glitch-mode {
  filter: invert(1);
}

.glitch-mode h1,
.glitch-mode p {
  animation: textGlitch 0.15s infinite;
}

@keyframes textGlitch {
  0% { transform: translate(2px, -2px); }
  50% { transform: translate(-2px, 2px); }
  100% { transform: translate(1px, 1px); }
}

/* 隠しボタン */
#hiddenBtn {
  position: fixed;
  bottom: 15px;
  right: 15px;
  width: 40px;
  height: 40px;
  background: transparent;
  z-index: 100;
  cursor: pointer;
}

/* ヒント（ホバーでほんのり光る） */
#hiddenBtn:hover {
  box-shadow: 0 0 10px rgba(255,0,0,0.4);
}
</style>
</head>
<body>

<div class="boot-screen" id="boot">
  <div>Do not close this window.</div>
  <div>Reality is temporarily unavailable.</div>
</div>

<div class="warning-screen" id="warning">
  Do not look it up.
</div>

<div class="noise" id="noiseLayer"></div>

<div class="container">
  <h1 id="name">イズミ</h1>
  <p id="desc">喋るのがすきです</p>
</div>

<div id="hiddenBtn"></div>

<script>
const noise = document.getElementById("noiseLayer");
const boot = document.getElementById("boot");
const warning = document.getElementById("warning");
const nameEl = document.getElementById("name");
const descEl = document.getElementById("desc");
const hiddenBtn = document.getElementById("hiddenBtn");

let glitchActive = false;

/* 起動演出 */
window.addEventListener("load", () => {
  setTimeout(() => noise.classList.add("active"), 1000);
  setTimeout(() => {
    boot.style.display = "none";
    noise.classList.remove("active");
  }, 1600);
});

/* 文字化け */
function corrupt(text) {
  const chars = "█▓▒░@#$%&*?";
  return text.split("").map(c =>
    Math.random() > 0.5
      ? chars[Math.floor(Math.random()*chars.length)]
      : c
  ).join("");
}

/* 隠しボタン */
hiddenBtn.addEventListener("click", () => {

  if (glitchActive) return;
  glitchActive = true;

  document.body.classList.add("glitch-mode");
  nameEl.innerText = corrupt("イズミ");
  descEl.innerText = corrupt("喋るのがすきです");
  noise.classList.add("active");

  setTimeout(() => {
    warning.style.display = "flex";
    noise.classList.remove("active");
  }, 600);

  setTimeout(() => {
    warning.style.display = "none";
    noise.classList.add("active");
  }, 1100);

  setTimeout(() => {
    document.body.classList.remove("glitch-mode");
    noise.classList.remove("active");
    nameEl.innerText = "イズミ";
    descEl.innerText = "喋るのがすきです";
    glitchActive = false;
  }, 1600);

});

/* Shiftキーギミック */
document.addEventListener("keydown", (e) => {
  if (e.key === "Shift") {
    nameEl.innerText = "IZUMI";
  }
});

document.addEventListener("keyup", (e) => {
  if (e.key === "Shift") {
    nameEl.innerText = "イズミ";
  }
});
</script>

</body>
</html>
