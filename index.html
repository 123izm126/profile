<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>izm | FINAL FORM</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif;}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#050510;
    color:white;
    overflow:hidden;
    transition:0.6s ease;
}

.container{
    text-align:center;
    padding:70px 100px;
    border-radius:20px;
    background:rgba(0,0,30,0.6);
    backdrop-filter:blur(15px);
    border:1px solid cyan;
    box-shadow:0 0 50px cyan;
    transition:0.6s ease;
}

h1{
    font-size:4rem;
    letter-spacing:10px;
    color:#00ffff;
    text-shadow:0 0 20px cyan,0 0 40px cyan;
    transition:0.4s ease;
}

.subtitle{
    margin-top:25px;
    opacity:0.7;
    letter-spacing:3px;
    transition:0.4s ease;
}

button{
    margin-top:40px;
    padding:12px 35px;
    border-radius:30px;
    border:1px solid cyan;
    background:transparent;
    color:cyan;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:cyan;
    color:black;
    transform:scale(1.1);
}

/* 崩壊 */
.glitch{
    animation:shake 0.15s infinite;
}

@keyframes shake{
    0%{transform:translate(4px,-4px);}
    25%{transform:translate(-4px,4px);}
    50%{transform:translate(4px,4px);}
    75%{transform:translate(-4px,-4px);}
    100%{transform:translate(0,0);}
}

/* モード変化 */
.shift1{background:white;color:black;}
.shift1 .container{background:rgba(255,255,255,0.9);border:1px solid black;box-shadow:0 0 40px black;}
.shift1 h1{color:black;text-shadow:none;}
.shift1 button{border:1px solid black;color:black;}
.shift1 button:hover{background:black;color:white;}

.shift2{background:#111;color:#ff0055;}
.shift2 h1{color:#ff0055;text-shadow:0 0 20px #ff0055;}
.shift2 .subtitle{opacity:0.4;}

.shift3{background:black;color:red;}
.shift3 .container{background:rgba(0,0,0,0.9);border:1px solid red;box-shadow:0 0 60px red;}
.shift3 h1{color:red;text-shadow:0 0 20px red;}
.shift3 button{border:1px solid red;color:red;}
.shift3 button:hover{background:red;color:black;}

/* 宇宙モード */
.space{
    background:radial-gradient(circle at center,#000010,#000000 70%);
}
.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    animation:twinkle 2s infinite alternate;
}
@keyframes twinkle{
    from{opacity:0.2;}
    to{opacity:1;}
}

</style>
</head>
<body>

<div class="container">
    <h1 id="title">IZM</h1>
    <div class="subtitle" id="subtitle">CLICK TO BREAK REALITY</div>
    <button onclick="shiftReality()">SHIFT</button>
</div>

<script>
let stage = 0;

function shiftReality(){
    const body = document.body;
    const title = document.getElementById("title");
    const subtitle = document.getElementById("subtitle");

    body.classList.add("glitch");

    setTimeout(()=>{
        body.classList.remove("glitch");
        stage++;

        body.className="";

        if(stage===1){
            body.classList.add("shift1");
            subtitle.textContent="REALITY INVERTED";
        }
        else if(stage===2){
            body.classList.add("shift2");
            title.textContent="???";
            subtitle.textContent="IDENTITY LOST";
        }
        else if(stage===3){
            body.classList.add("shift3");
            subtitle.textContent="DO NOT PROCEED";
        }
        else{
            body.classList.add("space");
            subtitle.textContent="SECRET MODE UNLOCKED";
            createStars();
        }

    },200);
}

function createStars(){
    for(let i=0;i<100;i++){
        const star=document.createElement("div");
        star.className="star";
        star.style.top=Math.random()*100+"%";
        star.style.left=Math.random()*100+"%";
        star.style.animationDuration=(Math.random()*3+1)+"s";
        document.body.appendChild(star);
    }
}
</script>

</body>
</html>
