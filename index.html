<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>イズミ | 自己紹介</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#ffffff;
    font-family:sans-serif;
    transition:0.3s ease;
}

.container{
    text-align:center;
}

h1{
    font-size:3rem;
    margin:0;
    cursor:pointer;
    transition:0.2s;
}

p{
    font-size:1.2rem;
    margin-top:20px;
}

button{
    margin-top:30px;
    padding:8px 18px;
    font-size:0.8rem;
    opacity:0;
    border:none;
    background:none;
    cursor:pointer;
}

/* グリッチ */
.glitch{
    animation:shake 0.15s;
}

@keyframes shake{
    0%{transform:translate(3px,-3px);}
    25%{transform:translate(-3px,3px);}
    50%{transform:translate(3px,3px);}
    75%{transform:translate(-3px,-3px);}
    100%{transform:translate(0,0);}
}

/* 深夜モード */
.night{
    background:#111;
    color:#eee;
}
</style>
</head>

<body>

<div class="container">
    <h1 id="name">イズミ</h1>
    <p id="text">喋るのがすきです</p>
    <button id="secret">.</button>
</div>

<script>
const body = document.body;
const nameEl = document.getElementById("name");
const textEl = document.getElementById("text");
const secretBtn = document.getElementById("secret");

let clickCount = 0;
let shiftCount = 0;

/* ⑤ 読み込み直後0.1秒ノイズ */
window.onload = () => {
    body.classList.add("glitch");
    setTimeout(()=>body.classList.remove("glitch"),100);
};

/* ① 名前5回クリック */
nameEl.addEventListener("click",()=>{
    clickCount++;
    if(clickCount >= 5){
        glitchEffect();
        clickCount = 0;
    }
});

function glitchEffect(){
    body.classList.add("glitch");
    nameEl.textContent = "???";
    setTimeout(()=>{
        nameEl.textContent = "イズミ";
        body.classList.remove("glitch");
    },200);
}

/* ② 深夜モード */
const hour = new Date().getHours();
if(hour >= 23 || hour <= 3){
    body.classList.add("night");
}

/* ③ shiftキー3回 */
document.addEventListener("keydown",(e)=>{
    if(e.key === "Shift"){
        shiftCount++;
        if(shiftCount >= 3){
            collapse();
            shiftCount = 0;
        }
    }
});

function collapse(){
    body.classList.add("glitch");
    body.style.transform = "scale(1.05)";
    setTimeout(()=>{
        body.style.transform = "scale(1)";
        body.classList.remove("glitch");
    },300);
}

/* 🔐 隠しボタン → 文字化け */
secretBtn.addEventListener("click",()=>{
    nameEl.textContent = "�%#@!Ξ※$";
    textEl.textContent = "∴⊿Ψ≈¶§∞";
});
</script>

</body>
</html>
